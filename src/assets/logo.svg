<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img">
  <title>phaZer logo</title>
  <desc>Pixelated circular clock logo for phaZer meeting timer app</desc>
 
  <!-- dark face -->
    <rect x="0" y="0" width="64" height="64" rx="12" fill="#0D001A"/>
 
  <!-- outer pixel ring — 12 squares at clock positions -->
  <!-- 12 o'clock -->
  <rect x="28" y="0" width="8" height="8" rx="1" fill="#1FAAFF"/>

  <!-- 1 o'clock -->
  <rect x="39" y="5" width="8" height="8" rx="1" fill="#4D8EFF"/>

  <!-- 2 o'clock -->
  <rect x="51" y="14" width="8" height="8" rx="1" fill="#7B6FFF"/>

  <!-- 3 o'clock -->
  <rect x="56" y="28" width="8" height="8" rx="1" fill="#B84FD8"/>

  <!-- 4 o'clock -->
  <rect x="51" y="42" width="8" height="8" rx="1" fill="#D440C8"/>

  <!-- 5 o'clock -->
  <rect x="40" y="51" width="8" height="8" rx="1" fill="#E040FB"/>

  <!-- 6 o'clock -->
  <rect x="28" y="56" width="8" height="8" rx="1" fill="#E040FB"/>

  <!-- 7 o'clock -->
  <rect x="14" y="51" width="8" height="8" rx="1" fill="#E040FB" opacity="0.55"/>

  <!-- 8 o'clock -->
  <rect x="5" y="42" width="8" height="8" rx="1" fill="#1FAAFF" opacity="0.35"/>

  <!-- 9 o'clock -->
  <rect x="0" y="28" width="8" height="8" rx="1" fill="#1FAAFF" opacity="0.35"/>

  <!-- 10 o'clock -->
  <rect x="5" y="14" width="8" height="8" rx="1" fill="#1FAAFF" opacity="0.55"/>

  <!-- 11 o'clock -->
  <rect x="14" y="5" width="8" height="8" rx="1" fill="#4D8EFF" opacity="0.7"/>
  <!-- inner face -->
  <!-- <circle cx="32" cy="32" r="22" width="38" height="38" rx="6" fill="#8d2a7418"/> -->
  
  <!-- hour hand — toward 10, pixel segments from center outward -->
  <rect x="30" y="14" width="4" height="4" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="30" y="19" width="4" height="4" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="30" y="24" width="4" height="4" rx="1" fill="#ffffff" opacity="0.9"/>
  
  <!-- minute hand — toward 2, pixel segments -->
  <rect x="44" y="21" width="4" height="4" rx="1" fill="#E040FB"/>
  <rect x="40" y="25" width="4" height="4" rx="1" fill="#E040FB"/>
  <rect x="36" y="29" width="4" height="4" rx="1" fill="#E040FB"/>

  <!-- Divides the clock into 12 slices to help with positioning each number -->
  <!-- <line x1="32" y1="32" x2="32" y2="0" stroke="white" stroke-width="0.5" />
  <line x1="32" y1="32" x2="48" y2="4" stroke="white" stroke-width="0.5" />
