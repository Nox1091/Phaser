  <line x1="32" y1="32" x2="64" y2="32" stroke="white" stroke-width="0.5" />
  <line x1="32" y1="32" x2="60" y2="48" stroke="white" stroke-width="0.5" />
  <line x1="32" y1="32" x2="48" y2="60" stroke="white" stroke-width="0.5" />
  <line x1="32" y1="32" x2="32" y2="64" stroke="white" stroke-width="0.5" />
  <line x1="32" y1="32" x2="16" y2="60" stroke="white" stroke-width="0.5" />
  <line x1="32" y1="32" x2="4" y2="48" stroke="white" stroke-width="0.5" />
